<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Helper – KCL Ticketing</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f0f2f5; padding: 24px; }
    .chat-wrap { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: 0 4px 20px rgba(0,0,0,.06); overflow: hidden; display: flex; flex-direction: column; min-height: 420px; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .chat-header h1 { margin: 0; font-size: 1.25rem; color: #1a237e; }
    .chat-header a { color: #1a237e; font-weight: 600; text-decoration: none; }
    .chat-header a:hover { text-decoration: underline; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .chat-msg { max-width: 88%; align-self: flex-start; }
    .chat-msg.user { align-self: flex-end; }
    .chat-msg-role { font-size: 0.75rem; font-weight: 600; color: #64748b; margin-bottom: 4px; }
    .chat-msg.user .chat-msg-role { text-align: right; }
    .chat-msg-content { padding: 10px 14px; border-radius: 10px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .chat-msg.user .chat-msg-content { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; }
    .chat-msg.assistant .chat-msg-content { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
    .chat-welcome { color: #64748b; font-size: 0.95rem; padding: 8px 0; }
    .chat-error { padding: 10px 20px; background: #fef2f2; color: #b91c1c; font-size: 0.875rem; border-top: 1px solid #fecaca; }
    .chat-form { padding: 14px 20px; border-top: 1px solid #e2e8f0; background: #f8fafc; display: flex; gap: 10px; }
    .chat-form input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; }
    .chat-form input:focus { outline: none; border-color: #1a237e; }
    .chat-form button { padding: 10px 20px; background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .chat-form button:hover { opacity: 0.92; }
    .chat-form button:disabled { opacity: 0.7; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-wrap">
    <div class="chat-header">
      <h1>AI Helper</h1>
      <a href="{% url 'home' %}">← Back</a>
    </div>
    <div class="chat-messages">
      {% if not messages %}
        <p class="chat-welcome">Ask a question about support, tickets, or studying. I’ll try to help.</p>
      {% endif %}
      {% for m in messages %}
        <div class="chat-msg {{ m.role }}">
          <span class="chat-msg-role">{% if m.role == 'user' %}You{% else %}Assistant{% endif %}</span>
          <div class="chat-msg-content">{{ m.content }}</div>
        </div>
      {% endfor %}
    </div>
    {% if error %}
      <div class="chat-error">{{ error }}</div>
    {% endif %}
    <form class="chat-form" method="post" action="">
      {% csrf_token %}
      <input type="text" name="message" placeholder="Type your question…" required autocomplete="off">
      <button type="submit">Send</button>
    </form>
  </div>
</body>
</html>
